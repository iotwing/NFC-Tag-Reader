      # Blau
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%
          transition_length: 0.1s
      - delay: 1s

      # Gelb
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 100%
          green: 100%
          blue: 0%
          transition_length: 0.1s
      - delay: 1s

      # Türkis
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 100%
          transition_length: 0.1s
      - delay: 1s

      # Violett
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 100%
          green: 0%
          blue: 100%
          transition_length: 0.1s
      - delay: 1s

      # Weiß
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 100%
          green: 100%
          blue: 100%
          transition_length: 0.1s
      - delay: 1s

      # Ausschalten
      - light.turn_off:
