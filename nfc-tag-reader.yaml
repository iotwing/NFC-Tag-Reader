    name: "Neustart"
    icon: "mdi:restart"
  
  - platform: template
    name: "LED-Farbtest"
    icon: "mdi:palette"
    on_press:
      # Rot
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
          transition_length: 0.1s
      - delay: 1s

      # Grün
      - light.turn_on:
          id: activity_led
          brightness: 100%
          red: 0%
          green: 100%
          blue: 0%
          transition_length: 0.1s
